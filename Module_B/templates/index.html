<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScholarEase | Scholarship Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    color: #333;
    overflow-x: hidden;
}

/* Animated Background */
.bg-animation {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.bg-animation span {
    position: absolute;
    display: block;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    bottom: -150px;
    animation: float 25s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
}

/* Layout */
.container {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 50px;
    max-width: 700px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: fadeUp 1s ease;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo {
    font-size: 70px;
    margin-bottom: 15px;
}

h1 {
    font-size: 2.8rem;
    color: #fff;
}

.tagline {
    color: #ddd;
    margin-top: 10px;
    font-size: 1.1rem;
}

/* Features */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    margin: 40px 0;
}

.feature {
    background: rgba(255,255,255,0.2);
    padding: 20px;
    border-radius: 12px;
    transition: 0.3s;
}

.feature:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.3);
}

.feature-icon {
    font-size: 30px;
    margin-bottom: 10px;
}

.feature h3 {
    color: #fff;
    font-size: 1.1rem;
}

.feature p {
    color: #eee;
    font-size: 0.9rem;
}

/* Buttons */
.buttons {
    margin-top: 30px;
}

.btn {
    padding: 14px 30px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    margin: 10px;
    font-size: 1rem;
    transition: 0.3s;
}

.btn-primary {
    background: #fff;
    color: #667eea;
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255,255,255,0.3);
}

.btn-secondary {
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
}

.btn-secondary:hover {
    background: #fff;
    color: #667eea;
}

/* Footer */
.footer {
    margin-top: 30px;
    color: #ddd;
    font-size: 0.85rem;
}

/* Responsive */
@media(max-width:768px){
    .card {
        padding: 30px;
    }

    h1 {
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<div class="bg-animation" id="bg"></div>

<div class="container">
    <div class="card">

        <div class="logo">🎓</div>

        <h1>ScholarEase</h1>
        <p class="tagline">Simplifying Scholarship Management</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📚</div>
                <h3>Easy Applications</h3>
                <p>Apply in just a few clicks with guided forms.</p>
            </div>

            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h3>Fast Verification</h3>
                <p>Real-time tracking and quick approvals.</p>
            </div>

            <div class="feature">
                <div class="feature-icon">🔒</div>
                <h3>Secure Payments</h3>
                <p>Safe and direct bank transfers.</p>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="location.href='login.html'">
                Get Started →
            </button>

            <button class="btn btn-secondary">
                Learn More
            </button>
        </div>

        <div class="footer">
            <p>© 2026 ScholarEase • Secure • Fast • Reliable</p>
        </div>

    </div>
</div>

<script>
const bg = document.getElementById("bg");

for (let i = 0; i < 40; i++) {
    let span = document.createElement("span");
    let size = Math.random() * 50 + 10;

    span.style.width = size + "px";
    span.style.height = size + "px";
    span.style.left = Math.random() * 100 + "%";
    span.style.animationDuration = (Math.random() * 20 + 10) + "s";
    span.style.animationDelay = Math.random() * 5 + "s";

    bg.appendChild(span);
}
</script>

</body>
</html>
